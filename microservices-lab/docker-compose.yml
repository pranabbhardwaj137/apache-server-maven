version: '3.9'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5005:5005"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "5006:5006"
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge